<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" type="text/css" href="index.css">

<body>

    <h1>My Emojis</h1>
    
    <div id="emoji-container"></div>

    <label for="input-emoji">Input emoji</label>

        <button id="add-start">Add to start</button>

        <button id="remove-start">Remove from start</button>
        <button id="remove-end">Remove from end</button>
    </div>

    



<script src="index.js"></script>
